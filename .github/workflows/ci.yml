name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type-check, Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: starlight
          POSTGRES_PASSWORD: starlight
          POSTGRES_DB: starlight_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://starlight:starlight@localhost:5432/starlight_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "26"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: npm ci --cache ~/.npm

      - name: Run migrations
        run: npx prisma migrate deploy
        working-directory: apps/api

      - name: Type-check
        run: npx turbo run type-check

      - name: Test
        run: npx turbo run test
